<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Nova Transação</title>
  <link rel="stylesheet" href="nt.css">
</head>

<body>

  <div class="container">
    <div class="card">

      <h2>Nova Transação</h2>

      <form id="formTransacao">
        <div class="input-group">
          <label>Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Mercado, Salário..." required>
        </div>

        <div class="input-group">
          <label>Valor</label>
          <input type="number" id="valor" placeholder="R$ 0,00" required>
        </div>

        <div class="input-group">
          <label>Tipo</label>
          <select id="tipo" >
            <option value="Receita" >Receita</option>
            <option value="Despesa" >Despesa</option>
          </select>
        </div>

        <div class="input-group">
          <label>Categoria</label>
          <select id="categoria" >
            <option>Salário</option>
            <option>Alimentação</option>
            <option>Transporte</option>
            <option>Lazer</option>
            <option>Moradia</option>
            <option>Outros</option>
          </select>
        </div>

        <div class="input-group">
          <label>Data</label>
          <input type="date" id="data" >
        </div>

        <button type="button" onclick="salvarTransacao()">Salvar Transação</button>
      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>

</html>
