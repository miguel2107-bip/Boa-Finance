<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resgistrar-Boa-Finance</title>
    <link rel="stylesheet" href="css/rstyle.css">
</head>

<body>
    <main class="register">
        <form>
            <h1>Registrar</h1>
            <div>
                    <input type="email" id="reg-email" placeholder="Email">
                </div>

                <div class="senha">
                    <input type="password" id="reg-senha" placeholder="Senha">
                </div>

                <div class="Confirmar">
                    <input type="password" id="reg-confirmar-senha" placeholder="Confirmar senha">
                </div>

                <div>
                    <button type="button" class="Registrar" onclick="Register()">Registrar</button>
                </div>

                <div>
                    <button type="button" class="Login" onclick="Logar()">Voltar</button>
                </div>
            </div>
        </form>
    </main>
    <script type="module" src="js/firebaseconfig.js"></script>
</body>

</html>
