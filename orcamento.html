<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoaFinance — Simulador de Gastos</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/orcamento.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
   <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">₿</span>
      <span class="logo-text">Boa<b>Finance</b></span>
    </div>
  
    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Início</span>
      </a>
  
      <a href="orcamento.html" onclick="Orçamento()" class="nav-item active">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <span>Simulador de gastos</span>
      </a>

      <a href="investimentos.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M3 17l6-6 4 4 8-8" />
          <path d="M14 7h7v7" />
        </svg>
  
        <span>Investimentos</span>
      </a>
      <a href="analise.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        <span>Análise</span>
      </a>
      <a href="metas.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.07 4.93A10 10 0 115 19.07" />
        </svg>
        <span>Metas</span>
      </a>
    </nav>
  
    <div class="sidebar-footer">
  <div class="user-avatar" id="bola-avatar">L</div>
  
  <div class="user-info">
    <span id="letra-perfil" class="user-name">Carregando...</span>
    <span class="user-plan">Plano Pro</span>
  </div>
  
  <a href="index.html" class="logout-btn" title="Sair" id="btn-sair">
    <svg viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
      <polyline points="16 17 21 12 16 7" />
      <line x1="21" y1="12" x2="9" y2="12" />
    </svg>
  </a>
</div>
  </aside>

  <!-- MAIN CONTENT -->

  <button id="menu-toggle" class="menu-toggle">
    ☰
    </button>

    <div id="overlay" class="overlay"></div>

  <main class="main">

    <!-- TOPBAR -->
<header class="topbar">

  <div class="topbar-left">
    <h1 class="page-title">Simulador de Gastos</h1>
    <span class="page-date" id="mesAtual"></span>
  </div>
  <div class="topbar-center">
    <div class="search-bar">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" placeholder="Pesquisar gastos..." />
    </div>
  </div>

  <div class="topbar-right">
    <button id="btnNovoGasto" class="btn-add">
      Novo Gasto
    </button>
  </div>

</header>
    <section class="simulator-content">
      <div class="summary-cards">
        <div class="card card-balance reveal">
          <div class="card-label">Total de Gastos</div>
          <div class="card-value red" id="totalGastos">R$ 0,00</div>
          <div class="card-trend">Seus gastos este mês</div>
          <div class="card-glow"></div>
        </div>
      </div>
      <div class="gastos-list-container">
        <h2>Meus Gastos</h2>
        <div id="listaGastos" class="orcamentos">
        </div>
      </div>
      <!-- Modal para adicionar novo gasto -->
      <div id="modalAdicionarGasto" class="modal">
        <div class="modal-content">
          <span class="close-button">&times;</span>
          <h2>Adicionar Novo Gasto</h2>
          <form id="formGasto">
            <div class="form-group">
              <label for="descricaoGasto">Descrição:</label>
              <input type="text" id="descricaoGasto" required>
            </div>
            <div class="form-group">
              <label for="valorGasto">Valor:</label>
              <input type="number" id="valorGasto" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="categoriaGasto">Categoria:</label>
              <select id="categoriaGasto" required>
                <option value="">Selecione</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Transporte">Transporte</option>
                <option value="Lazer">Lazer</option>
                <option value="Contas">Contas</option>
                <option value="Educação">Educação</option>
                <option value="Saúde">Saúde</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="form-group">
              <label for="dataGasto">Data:</label>
              <input type="date" id="dataGasto">
            </div>
            <button type="submit" class="btn-submit">Salvar Gasto</button>
          </form>
        </div>
      </div>

    </section>
  </main>

  <script src="js/navegacao.js"></script>
  <script src="js/script.js"></script>
  <script src="js/simulador.js"></script>
  <script type="module" src="js/perfil.js"></script>
</body>

</html>
